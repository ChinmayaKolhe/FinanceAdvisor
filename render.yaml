services:
  - type: web
    name: finance-advisor-backend
    runtime: java
    buildCommand: cd backend && mvn clean install -DskipTests
    startCommand: cd backend && java -jar target/finance-advisor-backend-1.0.0.jar
    envVars:
      - key: SPRING_DATA_MONGODB_URI
        value: mongodb+srv://finance:finance@financeadvisor.p0euqix.mongodb.net/financeAdvisorDB?retryWrites=true&w=majority&appName=financeAdvisor
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_JWT_EXPIRATION
        value: 86400000
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://your-frontend.netlify.app
